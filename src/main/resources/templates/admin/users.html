<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(pageTitle='Manage Users', activePage='users', content=~{::content})}">
<body>
<th:block th:fragment="content">

<div class="row g-3">
    <!-- Add User Form -->
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-white py-3">
                <h6 class="mb-0 fw-semibold"><i class="bi bi-person-plus me-2 text-primary"></i>Add New User</h6>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/users/add}" method="post" th:object="${newUser}">
                    <div class="mb-2">
                        <label class="form-label small fw-semibold">Full Name</label>
                        <input type="text" th:field="*{name}" class="form-control form-control-sm" required/>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small fw-semibold">Username</label>
                        <input type="text" th:field="*{username}" class="form-control form-control-sm" required/>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small fw-semibold">Email</label>
                        <input type="email" th:field="*{email}" class="form-control form-control-sm" required/>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small fw-semibold">Password</label>
                        <input type="password" th:field="*{password}" class="form-control form-control-sm" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Role</label>
                        <select th:field="*{role}" class="form-select form-select-sm">
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">ROLE</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm w-100">
                        <i class="bi bi-person-check me-1"></i>Create User
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- User List -->
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white py-3">
                <h6 class="mb-0 fw-semibold">
                    <i class="bi bi-people me-2 text-primary"></i>All System Users
                    <span class="badge bg-primary ms-1" th:text="${users.size()}">0</span>
                </h6>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr><th>Name</th><th>Username</th><th>Email</th><th>Role</th><th>Action</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td class="fw-semibold" th:text="${u.name}">Name</td>
                            <td class="text-muted" th:text="${u.username}">user</td>
                            <td class="small" th:text="${u.email}">email</td>
                            <td>
                                <span th:class="'badge ' +
                                    (${u.role.name() == 'ADMIN'} ? 'bg-danger' :
                                    (${u.role.name() == 'DOCTOR'} ? 'bg-primary' :
                                    (${u.role.name() == 'NURSE'} ? 'bg-success' : 'bg-secondary')))"
                                      th:text="${u.role}">ROLE</span>
                            </td>
                            <td>
                                <form th:action="@{/admin/users/delete/{id}(id=${u.userId})}" method="post"
                                      onsubmit="return confirm('Delete user ' + '[[${u.username}]]' + '?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</th:block>
</body>
</html>
