<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login | SmartHospital</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/hospital.css}" rel="stylesheet"/>
</head>
<body class="login-page">
<div class="card login-card">
    <div class="card-header">
        <i class="bi bi-hospital text-white" style="font-size:2rem;"></i>
        <h4 class="text-white mb-0 mt-2 fw-bold">SmartHospital</h4>
        <p class="text-white-50 mb-0 small">Bed &amp; Resource Allocation System</p>
    </div>
    <div class="card-body p-4">
        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-circle me-1"></i>Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-info py-2 small">
            <i class="bi bi-check-circle me-1"></i>You have been logged out.
        </div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold small">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold small">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
        </form>
        <div class="demo-creds mt-3 p-3">
            <p class="fw-semibold mb-2 text-muted">Demo credentials:</p>
            <div class="row g-1">
                <div class="col-6"><code>admin</code> / <code>admin123</code> <span class="badge bg-danger ms-1">Admin</span></div>
                <div class="col-6"><code>doctor</code> / <code>doctor123</code> <span class="badge bg-primary ms-1">Doctor</span></div>
                <div class="col-6"><code>nurse</code> / <code>nurse123</code> <span class="badge bg-success ms-1">Nurse</span></div>
                <div class="col-6"><code>reception</code> / <code>reception123</code> <span class="badge bg-secondary ms-1">Recept.</span></div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
