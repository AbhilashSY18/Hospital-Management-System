<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(pageTitle='Dashboard', activePage='dashboard', content=~{::content})}">
<body>
<th:block th:fragment="content">

<div class="row g-3 mb-4">
    <!-- Stat cards -->
    <div class="col-md-3">
        <div class="stat-card d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#dbeafe;color:#1d4ed8;"><i class="bi bi-columns-gap"></i></div>
            <div>
                <div class="text-muted small">Total Beds</div>
                <div class="fs-3 fw-bold" th:text="${totalBeds}">0</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#d1fae5;color:#065f46;"><i class="bi bi-check-circle"></i></div>
            <div>
                <div class="text-muted small">Available Beds</div>
                <div class="fs-3 fw-bold text-success" th:text="${availableBeds}">0</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#fee2e2;color:#991b1b;"><i class="bi bi-person-fill"></i></div>
            <div>
                <div class="text-muted small">Occupied Beds</div>
                <div class="fs-3 fw-bold text-danger" th:text="${occupiedBeds}">0</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#fef3c7;color:#92400e;"><i class="bi bi-clipboard2-pulse"></i></div>
            <div>
                <div class="text-muted small">Active Admissions</div>
                <div class="fs-3 fw-bold text-warning" th:text="${activeAdmissions}">0</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#ede9fe;color:#5b21b6;"><i class="bi bi-people"></i></div>
            <div>
                <div class="text-muted small">Total Patients</div>
                <div class="fs-3 fw-bold" th:text="${totalPatients}">0</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#ecfccb;color:#3f6212;"><i class="bi bi-box-seam"></i></div>
            <div>
                <div class="text-muted small">Available Resources</div>
                <div class="fs-3 fw-bold text-success" th:text="${availableResources}">0</div>
            </div>
        </div>
    </div>
</div>

<!-- Recent Active Admissions -->
<div class="card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
        <h6 class="mb-0 fw-semibold"><i class="bi bi-clipboard2-pulse me-2 text-primary"></i>Active Admissions</h6>
        <a th:href="@{/patients/admissions}" class="btn btn-sm btn-outline-primary">View All</a>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th><th>Patient</th><th>Bed</th><th>Ward</th><th>Admitted</th><th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${recentAdmissions}" th:if="${!recentAdmissions.isEmpty()}">
                        <td th:text="${a.admissionId}">#</td>
                        <td th:text="${a.patient.name}">Patient</td>
                        <td th:text="${a.bed.bedNumber}">Bed</td>
                        <td><span class="badge bg-secondary" th:text="${a.bed.wardType}">WARD</span></td>
                        <td th:text="${#temporals.format(a.admissionDate,'dd MMM, HH:mm')}">Date</td>
                        <td><span class="badge bg-success">Active</span></td>
                    </tr>
                    <tr th:if="${recentAdmissions.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-3">No active admissions</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</th:block>
</body>
</html>
