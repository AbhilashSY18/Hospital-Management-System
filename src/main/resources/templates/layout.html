<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(pageTitle, activePage, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | SmartHospital'">SmartHospital</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/hospital.css}" rel="stylesheet"/>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar d-flex flex-column">
    <div class="brand"><i class="bi bi-hospital me-2"></i>SmartHospital</div>
    <ul class="nav flex-column mt-2 flex-grow-1">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/dashboard}" th:classappend="${activePage=='dashboard'?'active':''}">
                <i class="bi bi-grid-1x2"></i>Dashboard
            </a>
        </li>
        <div class="section-nav">Beds</div>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/beds}" th:classappend="${activePage=='beds'?'active':''}">
                <i class="bi bi-columns-gap"></i>Manage Beds
            </a>
        </li>
        <div class="section-nav">Patients</div>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/patients}" th:classappend="${activePage=='patients'?'active':''}">
                <i class="bi bi-person-lines-fill"></i>Patients
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/patients/admit}" th:classappend="${activePage=='admit'?'active':''}">
                <i class="bi bi-person-plus"></i>Admit Patient
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/patients/admissions}" th:classappend="${activePage=='admissions'?'active':''}">
                <i class="bi bi-clipboard2-pulse"></i>Active Admissions
            </a>
        </li>
        <div class="section-nav">Resources</div>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/resources}" th:classappend="${activePage=='resources'?'active':''}">
                <i class="bi bi-box-seam"></i>Resources
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','DOCTOR')">
            <a class="nav-link" th:href="@{/resources/allocate}" th:classappend="${activePage=='allocate'?'active':''}">
                <i class="bi bi-arrow-left-right"></i>Allocate Resource
            </a>
        </li>
        <div class="section-nav" sec:authorize="hasRole('ADMIN')">Admin</div>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a class="nav-link" th:href="@{/reports}" th:classappend="${activePage=='reports'?'active':''}">
                <i class="bi bi-bar-chart-line"></i>Reports
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a class="nav-link" th:href="@{/admin/users}" th:classappend="${activePage=='users'?'active':''}">
                <i class="bi bi-people"></i>Manage Users
            </a>
        </li>
    </ul>
    <!-- Logout -->
    <div class="p-3 border-top" style="border-color: rgba(255,255,255,.1) !important;">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-sm btn-outline-light w-100">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </form>
    </div>
</nav>

<!-- Main -->
<div class="main-content">
    <div class="topbar">
        <h5 class="mb-0 fw-semibold" th:text="${pageTitle}">Page Title</h5>
        <div class="d-flex align-items-center gap-2">
            <span class="text-muted small"><i class="bi bi-person-circle me-1"></i>
                <span sec:authentication="name">User</span>
                &nbsp;·&nbsp;
                <span sec:authorize="hasRole('ADMIN')" class="badge bg-danger">Admin</span>
                <span sec:authorize="hasRole('DOCTOR')" class="badge bg-primary">Doctor</span>
                <span sec:authorize="hasRole('NURSE')" class="badge bg-success">Nurse</span>
                <span sec:authorize="hasRole('RECEPTIONIST')" class="badge bg-secondary">Reception</span>
            </span>
        </div>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Page content injected here -->
    <div th:replace="${content}"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
