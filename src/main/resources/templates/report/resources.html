<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(pageTitle='Resource Usage Report', activePage='reports', content=~{::content})}">
<body>
<th:block th:fragment="content">

<div class="d-flex justify-content-between align-items-center mb-3">
    <a th:href="@{/reports}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Reports
    </a>
    <span class="text-muted small">Generated: <span th:text="${generatedAt}">-</span></span>
</div>

<div class="row g-3 mb-4">
    <div class="col-md-4">
        <div class="stat-card text-center">
            <div class="fs-1 fw-bold" th:text="${totalResources}">0</div>
            <div class="text-muted small">Total Resources</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="stat-card text-center">
            <div class="fs-1 fw-bold text-success" th:text="${availableResources}">0</div>
            <div class="text-muted small">Available</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="stat-card text-center">
            <div class="fs-1 fw-bold text-warning" th:text="${utilisationRate}">0%</div>
            <div class="text-muted small">Utilisation Rate</div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header bg-white py-3">
        <h6 class="mb-0 fw-semibold"><i class="bi bi-box-seam me-2"></i>All Resources</h6>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
                <tr><th>Name</th><th>Type</th><th>Available</th><th>Total</th><th>Status</th><th>Location</th></tr>
            </thead>
            <tbody>
                <tr th:each="r : ${allResources}">
                    <td class="fw-semibold" th:text="${r.resourceName}">-</td>
                    <td><span class="badge bg-secondary" th:text="${r.type}">-</span></td>
                    <td th:text="${r.availableQuantity}">0</td>
                    <td th:text="${r.totalQuantity}">0</td>
                    <td>
                        <span th:class="'badge ' + (${r.availabilityStatus.name() == 'AVAILABLE'} ? 'badge-available' : 'badge-occupied')"
                              th:text="${r.availabilityStatus}">-</span>
                    </td>
                    <td class="small text-muted" th:text="${r.location}">-</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block>
</body>
</html>
