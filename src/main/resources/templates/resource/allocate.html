<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(pageTitle='Allocate Resource', activePage='allocate', content=~{::content})}">
<body>
<th:block th:fragment="content">

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card">
            <div class="card-header bg-white py-3">
                <h6 class="mb-0 fw-semibold">
                    <i class="bi bi-arrow-left-right me-2 text-success"></i>Allocate Medical Resource to Patient
                </h6>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/resources/allocate}" method="post">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Select Resource <span class="text-danger">*</span></label>
                        <select name="resourceId" class="form-select" required>
                            <option value="">-- Choose an available resource --</option>
                            <option th:each="r : ${availableResources}"
                                    th:value="${r.resourceId}"
                                    th:text="${r.resourceName} + ' [' + ${r.type} + '] — ' + ${r.availableQuantity} + ' available'">
                                Resource
                            </option>
                        </select>
                        <div class="form-text text-success">
                            <i class="bi bi-check-circle me-1"></i>
                            <span th:text="${availableResources.size()}">0</span> resources available.
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Select Patient <span class="text-danger">*</span></label>
                        <select name="patientId" class="form-select" required>
                            <option value="">-- Choose an admitted patient --</option>
                            <option th:each="p : ${admittedPatients}"
                                    th:value="${p.patientId}"
                                    th:text="${p.name} + ' — ' + ${p.condition}">
                                Patient
                            </option>
                        </select>
                        <div class="form-text">Only currently admitted patients are listed.</div>
                    </div>

                    <div class="alert alert-secondary py-2 small">
                        <i class="bi bi-shield-check me-2"></i>
                        <strong>Decorator Pattern active:</strong> This allocation passes through
                        Validation (overallocation prevention) → Logging (audit trail) → Base allocator.
                    </div>

                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-success px-4">
                            <i class="bi bi-check-circle me-2"></i>Allocate
                        </button>
                        <a th:href="@{/resources}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</th:block>
</body>
</html>
