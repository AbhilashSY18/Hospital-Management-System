<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(pageTitle='Medical Resources', activePage='resources', content=~{::content})}">
<body>
<th:block th:fragment="content">

<div class="row g-3">
    <!-- Add Resource (Admin only) -->
    <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
        <div class="card">
            <div class="card-header bg-white py-3">
                <h6 class="mb-0 fw-semibold"><i class="bi bi-plus-circle me-2 text-primary"></i>Add Resource</h6>
            </div>
            <div class="card-body">
                <form th:action="@{/resources/add}" method="post" th:object="${newResource}">
                    <div class="mb-2">
                        <label class="form-label small fw-semibold">Resource Name</label>
                        <input type="text" th:field="*{resourceName}" class="form-control form-control-sm"
                               placeholder="e.g. Ventilator C" required/>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small fw-semibold">Type</label>
                        <select th:field="*{type}" class="form-select form-select-sm">
                            <option th:each="t : ${resourceTypes}" th:value="${t}" th:text="${t}">TYPE</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small fw-semibold">Total Quantity</label>
                        <input type="number" th:field="*{totalQuantity}" class="form-control form-control-sm" min="1" value="1"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Location</label>
                        <input type="text" th:field="*{location}" class="form-control form-control-sm"
                               placeholder="e.g. ICU Wing"/>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm w-100">
                        <i class="bi bi-plus-lg me-1"></i>Add Resource
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Resource List -->
    <div th:classappend="${#authorization.expression('hasRole(''ADMIN'')')} ? 'col-md-8' : 'col-12'">
        <div class="card">
            <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                <h6 class="mb-0 fw-semibold">
                    <i class="bi bi-box-seam me-2 text-primary"></i>All Medical Resources
                </h6>
                <a th:href="@{/resources/allocate}" class="btn btn-sm btn-success"
                   sec:authorize="hasAnyRole('ADMIN','DOCTOR')">
                    <i class="bi bi-arrow-left-right me-1"></i>Allocate
                </a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th><th>Type</th><th>Available</th><th>Total</th>
                                <th>Location</th><th>Status</th>
                                <th sec:authorize="hasAnyRole('ADMIN','DOCTOR')">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${resources}">
                                <td class="fw-semibold" th:text="${r.resourceName}">Name</td>
                                <td><span class="badge bg-secondary" th:text="${r.type}">TYPE</span></td>
                                <td>
                                    <span th:class="'fw-semibold ' + (${r.availableQuantity > 0} ? 'text-success' : 'text-danger')"
                                          th:text="${r.availableQuantity}">0</span>
                                </td>
                                <td th:text="${r.totalQuantity}">0</td>
                                <td class="small text-muted" th:text="${r.location}">-</td>
                                <td>
                                    <span th:class="'badge ' +
                                        (${r.availabilityStatus.name() == 'AVAILABLE'} ? 'badge-available' :
                                        (${r.availabilityStatus.name() == 'ALLOCATED'} ? 'badge-occupied' : 'badge-maintenance'))"
                                          th:text="${r.availabilityStatus}">STATUS</span>
                                </td>
                                <td sec:authorize="hasAnyRole('ADMIN','DOCTOR')">
                                    <div class="d-flex gap-1">
                                        <form th:action="@{/resources/release/{id}(id=${r.resourceId})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-success"
                                                    th:disabled="${r.availableQuantity >= r.totalQuantity}">
                                                <i class="bi bi-arrow-counterclockwise"></i> Release
                                            </button>
                                        </form>
                                        <form th:action="@{/resources/delete/{id}(id=${r.resourceId})}" method="post"
                                              onsubmit="return confirm('Delete this resource?')"
                                              sec:authorize="hasRole('ADMIN')">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${resources.isEmpty()}">
                                <td colspan="7" class="text-center text-muted py-3">No resources found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</th:block>
</body>
</html>
